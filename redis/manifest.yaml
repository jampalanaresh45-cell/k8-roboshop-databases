## service, headless service, statefulset, pvc  
apiVersion: v1 
kind: Service
metadata:
    name: redis
    namespace: roboshop
spec:    
    selector:
      project: roboshop
      component: redis
      tier: db
    ports:
    - protocol: TCP
      port: 6379 ## service port
      targetPort: 6379  ## container port
---
apiVersion: v1 
kind: Service
metadata:
    name: redis-headless
    namespace: roboshop
spec:  
    clusterIP: None  
    selector:
      project: roboshop
      component: redis
      tier: db
    ports:
    - protocol: TCP
      port: 6379 ## service port
      targetPort: 6379 ## container port
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-headless
  labels:
    app: nginx
    purpose: stateful-demo
spec:
  ports:
  - port: 80
    name: web
  selector:
    app: nginx
    purpose: stateful-demo
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: roboshop
spec:
  selector:
    matchLabels:
      project: roboshop
      component: redis
      tier: db
  serviceName: "redis-headless" ## this should be headless service name
  replicas: 2 # by default is 1
  template:
    metadata:
      labels:
        project: roboshop
        component: redis
        tier: db

    spec:
      containers:
      - name: redis
        image: redis:7.0 
        volumeMounts:
        - name: redis
          mountPath: /data
## This is PVC 
  volumeClaimTemplates:
  - metadata:
      name: redis ## this is the name of PVC, and it will be used in volumeMounts
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "roboshop-ebs"
      resources:
        requests:
          storage: 1Gi