apiVersion: v1 
kind: ConfigMap
metadata:
    name: mysql
    namespace: roboshop
data:
  my.cnf: |
    [mysqld]
    innodb_redo_log_capacity=2G
---
## service, headless service, statefulset, pvc  
apiVersion: v1 
kind: Service
metadata:
    name: mysql
    namespace: roboshop
spec:    
    selector:
      project: roboshop
      component: mysql
      tier: db
    ports:
    - protocol: TCP
      port: 27017 ## service port
      targetPort: 27017 ## container port
---
apiVersion: v1 
kind: Service
metadata:
    name: mysql-headless
    namespace: roboshop
spec:  
    clusterIP: None  
    selector:
      project: roboshop
      component: mysql
      tier: db
    ports:
    - protocol: TCP
      port: 3306 ## service port
      targetPort: 3306 ## container port
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-headless
  labels:
    app: nginx
    purpose: stateful-demo
spec:
  ports:
  - port: 80
    name: web
  selector:
    app: nginx
    purpose: stateful-demo
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: roboshop
spec:
  selector:
    matchLabels:
      project: roboshop
      component: mysql
      tier: db
  serviceName: "mysql-headless" ## this should be headless service name
  replicas: 2 # by default is 1
  template:
    metadata:
      labels:
        project: roboshop
        component: mysql
        tier: db

    spec:
      containers:
      - name: mysql
        image: naresh1567/mysql:v1 
        volumeMounts:
        - name: mysql
          mountPath: /data/db
        - name: mysql-config
          mountPath: /etc/mysql/conf.d/my.cnf
          subPath: my.cnf

      volumes:
        - name: mysql-config
          configMap:
            name: mysql    
## This is PVC 
  volumeClaimTemplates:
  - metadata:
      name: mysql ## this is the name of PVC, and it will be used in volumeMounts
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "roboshop-ebs"
      resources:
        requests:
          storage: 1Gi