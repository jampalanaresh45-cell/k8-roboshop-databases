## service, headless service, statefulset, pvc  
apiVersion: v1 
kind: Service
metadata:
    name: mongodb
    namespace: roboshop
spec:    
    selector:
      project: roboshop
      component: mongodb
      tier: db
    ports:
    - protocol: TCP
      port: 27017 ## service port
      targetPort: 27017 ## container port
---
apiVersion: v1 
kind: Service
metadata:
    name: mongodb-headless
    namespace: roboshop
spec:  
    clusterIP: None  
    selector:
      project: roboshop
      component: mongodb
      tier: db
    ports:
    - protocol: TCP
      port: 27017 ## service port
      targetPort: 27017 ## container port
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-headless
  labels:
    app: nginx
    purpose: stateful-demo
spec:
  ports:
  - port: 80
    name: web
  selector:
    app: nginx
    purpose: stateful-demo
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: roboshop
spec:
  selector:
    matchLabels:
      project: roboshop
      component: mongodb
      tier: db
  serviceName: "mongodb-headless" ## this should be headless service name
  replicas: 2 # by default is 1
  template:
    metadata:
      labels:
        project: roboshop
        component: mongodb
        tier: db

    spec:
      containers:
      - name: mongodb
        image: naresh1567/mongo:7.0
        volumeMounts:
        - name: mongodb
          mountPath: /data/db
## This is PVC 
  volumeClaimTemplates:
  - metadata:
      name: mongodb ## this is the name of PVC, and it will be used in volumeMounts
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "roboshop-ebs"
      resources:
        requests:
          storage: 1Gi